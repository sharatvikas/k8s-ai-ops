{{- if and .Values.anthropicApiKey.value (not .Values.anthropicApiKey.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "k8s-ai-ops.fullname" . }}-api-key
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-ai-ops.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.anthropicApiKey.existingSecretKey }}: {{ .Values.anthropicApiKey.value | quote }}
{{- end }}
