apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s-ai-ops.fullname" . }}
  labels:
    {{- include "k8s-ai-ops.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "k8s-ai-ops.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "k8s-ai-ops.selectorLabels" . | nindent 8 }}
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      serviceAccountName: {{ include "k8s-ai-ops.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --anthropic-model={{ .Values.anthropicModel }}
            - --metrics-bind-address=:{{ .Values.metrics.port }}
            - --health-probe-bind-address=:8081
            - --zap-encoder={{ .Values.logging.encoder }}
            - --zap-log-level={{ .Values.logging.level }}
            - --insight-ttl={{ .Values.insightTTL }}
            {{- if .Values.leaderElection.enabled }}
            - --leader-elect
            {{- end }}
            {{- if .Values.remediation.enabled }}
            - --enable-remediation
            - --remediation-cooldown={{ .Values.remediation.cooldown }}
            - --max-remediations-per-hour={{ .Values.remediation.maxPerHour }}
            {{- end }}
            - --crashloop-restart-threshold={{ .Values.remediation.crashloopRestartThreshold }}
            {{- with .Values.remediation.ignoreNamespaces }}
            - --ignore-namespaces={{ join "," . }}
            {{- end }}
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.anthropicApiKey.existingSecret }}{{ .Values.anthropicApiKey.existingSecret }}{{ else }}{{ include "k8s-ai-ops.fullname" . }}-api-key{{ end }}
                  key: {{ .Values.anthropicApiKey.existingSecretKey }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 10
