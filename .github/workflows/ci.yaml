name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22", "1.23"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build CLI
        run: go build -v ./cmd/k8sai/...

      - name: Build operator
        run: go build -v ./cmd/operator/...

      - name: Run tests
        run: go test ./... -v -race -timeout 120s
        env:
          ANTHROPIC_API_KEY: "test-key-not-called-in-unit-tests"

      - name: Run go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  docker:
    name: Docker build (CLI + Operator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build CLI image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: cli
          push: false
          tags: k8s-ai-ops-cli:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build operator image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: operator
          push: false
          tags: k8s-ai-ops-operator:test

  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Lint chart
        run: helm lint helm/k8s-ai-ops/
