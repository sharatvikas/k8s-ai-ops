name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"   # pre-releases: v1.2.3-rc.1

env:
  REGISTRY: ghcr.io
  IMAGE_CLI: ghcr.io/${{ github.repository_owner }}/k8s-ai-ops-cli
  IMAGE_OPERATOR: ghcr.io/${{ github.repository_owner }}/k8s-ai-ops-operator

jobs:
  release-docker:
    name: Release Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Create GitHub release
      packages: write    # Push to GHCR
      id-token: write    # cosign keyless signing

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Need full history for changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Run tests (gate)
        run: go test ./... -race -timeout 120s
        env:
          ANTHROPIC_API_KEY: "test-key-not-called-in-unit-tests"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata — CLI
        id: meta-cli
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_CLI }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
          flavor: |
            latest=false

      - name: Docker metadata — Operator
        id: meta-operator
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_OPERATOR }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
          flavor: |
            latest=false

      - name: Build and push CLI image
        id: push-cli
        uses: docker/build-push-action@v5
        with:
          context: .
          target: cli
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-cli.outputs.tags }}
          labels: ${{ steps.meta-cli.outputs.labels }}
          cache-from: type=gha,scope=cli
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Build and push Operator image
        id: push-operator
        uses: docker/build-push-action@v5
        with:
          context: .
          target: operator
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-operator.outputs.tags }}
          labels: ${{ steps.meta-operator.outputs.labels }}
          cache-from: type=gha,scope=operator
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign images
        run: |
          cosign sign --yes ${{ env.IMAGE_CLI }}@${{ steps.push-cli.outputs.digest }}
          cosign sign --yes ${{ env.IMAGE_OPERATOR }}@${{ steps.push-operator.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "true"

      - name: Build release binaries (cross-platform)
        run: |
          VERSION=${{ github.ref_name }}
          LDFLAGS="-X main.version=${VERSION} -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          for GOOS in linux darwin windows; do
            for GOARCH in amd64 arm64; do
              # Skip windows/arm64 — uncommon for CLI tooling
              [ "$GOOS" = "windows" ] && [ "$GOARCH" = "arm64" ] && continue

              EXT=""
              [ "$GOOS" = "windows" ] && EXT=".exe"

              OUTNAME="k8sai-${GOOS}-${GOARCH}${EXT}"
              GOOS=$GOOS GOARCH=$GOARCH go build \
                -ldflags "${LDFLAGS}" \
                -o "dist/${OUTNAME}" \
                ./cmd/k8sai/

              echo "Built ${OUTNAME}"
            done
          done

          # Checksums
          cd dist && sha256sum * > checksums.txt
          cat checksums.txt

      - name: Package Helm chart
        run: |
          mkdir -p dist/helm
          helm package helm/k8s-ai-ops/ --version ${{ github.ref_name }} --destination dist/helm/
          helm repo index dist/helm/ --url https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/

      - name: Generate changelog for this release
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^1 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges | head -20)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "k8s-ai-ops ${{ github.ref_name }}"
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ## Docker Images

            ```bash
            # CLI
            docker pull ${{ env.IMAGE_CLI }}:${{ github.ref_name }}

            # Operator
            docker pull ${{ env.IMAGE_OPERATOR }}:${{ github.ref_name }}
            ```

            ## Verify signatures

            ```bash
            cosign verify \
              --certificate-identity-regexp="https://github.com/${{ github.repository }}.*" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
              ${{ env.IMAGE_CLI }}:${{ github.ref_name }}
            ```

            ## Install CLI

            ```bash
            # Linux/macOS
            curl -Lo k8sai https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/k8sai-$(uname -s | tr '[:upper:]' '[:lower:]')-$(uname -m | sed s/x86_64/amd64/)
            chmod +x k8sai && sudo mv k8sai /usr/local/bin/
            ```

            ## Helm

            ```bash
            helm install k8s-ai-ops oci://ghcr.io/${{ github.repository_owner }}/charts/k8s-ai-ops \
              --version ${{ github.ref_name }}
            ```
          files: |
            dist/k8sai-*
            dist/checksums.txt
            dist/helm/*.tgz

      - name: Step summary
        run: |
          echo "## Release ${{ github.ref_name }} Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| CLI Image | \`${{ env.IMAGE_CLI }}:${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Operator Image | \`${{ env.IMAGE_OPERATOR }}:${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| CLI Digest | \`${{ steps.push-cli.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Operator Digest | \`${{ steps.push-operator.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY

  update-helm-index:
    name: Update Helm chart index
    runs-on: ubuntu-latest
    needs: release-docker
    if: "!contains(github.ref_name, '-')"   # Only stable releases
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Download chart from release
        run: |
          VERSION=${{ github.ref_name }}
          mkdir -p charts
          curl -sL https://github.com/${{ github.repository }}/releases/download/${VERSION}/k8s-ai-ops-${VERSION}.tgz \
            -o charts/k8s-ai-ops-${VERSION}.tgz
          helm repo index charts/ \
            --url https://github.com/${{ github.repository }}/releases/download/${VERSION}/ \
            --merge index.yaml 2>/dev/null || \
          helm repo index charts/ \
            --url https://github.com/${{ github.repository }}/releases/download/${VERSION}/
          cp charts/index.yaml index.yaml

      - name: Commit updated Helm index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.yaml charts/
          git commit -m "chore: update Helm chart index for ${{ github.ref_name }}" || echo "No changes"
          git push
